name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release -p ai-gateway --features tray

      - name: Package release
        shell: pwsh
        run: |
          $name = "ai-gateway"
          $bin  = "target/release/$name.exe"
          $out  = "dist"

          New-Item -ItemType Directory -Path "$out/Assets" -Force | Out-Null

          Copy-Item $bin                                "$out/$name.exe"
          Copy-Item "crates/$name/README.md"            "$out/README.md"
          Copy-Item "crates/$name/config.example.yaml"  "$out/config.example.yaml"
          Copy-Item "crates/$name/config.example.yaml"  "$out/config.yaml"
          Copy-Item "Assets/icon.ico"                   "$out/Assets/icon.ico"
          Copy-Item "Assets/logo.jpg"                   "$out/Assets/logo.jpg"

          $hash = (Get-FileHash "$out/$name.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.exe" | Set-Content "$out/SHA256SUMS.txt" -NoNewline

          Compress-Archive -Path "$out/*" -DestinationPath "$name-windows-x86_64.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 is pre-installed on windows-latest runners
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Warning "Inno Setup not found — skipping installer"
            exit 0
          }
          # The .iss expects artifacts in ./release, so copy from dist
          New-Item -ItemType Directory -Path "release/Assets" -Force | Out-Null
          Copy-Item "dist/*" "release/" -Recurse -Force
          & $iscc "scripts/installer.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-gateway-windows-x86_64.zip
            release/OBEY-API-Gateway-Setup-*.exe
            dist/SHA256SUMS.txt
